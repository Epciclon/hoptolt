name: Pipeline de Integración Continua

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  frontend-checks:
    name: Revisión del Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar Linter
        run: npm run lint

      - name: Revisar Tipado (TypeScript)
        run: npx tsc --noEmit

      - name: Ejecutar Pruebas Unitarias (Vitest)
        run: npm run test

      - name: Compilar App (Build Next.js)
        run: npm run build

      - name: Instalar Navegadores de Playwright
        run: npx playwright install --with-deps chromium

      - name: Ejecutar Pruebas E2E (Playwright)
        run: npm run test:e2e
        
      - name: Guardar Reporte de Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-playwright
          path: frontend/playwright-report/
          retention-days: 10

  backend-checks:
    name: Revisión del Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar Pruebas Unitarias e Integración (Jest)
        run: npm run test
